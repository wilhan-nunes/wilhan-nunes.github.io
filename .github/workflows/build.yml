name: Build & Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:            # allow manual trigger from GitHub UI

permissions:
  contents: write               # needed to commit regenerated static files

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install bibtexparser jinja2 playwright
          python -m playwright install --with-deps chromium

      - name: Build publications
        run: python build_publications.py

      - name: Build PDF
        run: python build_pdf.py

      - name: Commit updated generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html _publications.html Wilhan_Nunes_CV.pdf
          git diff --cached --quiet || git commit -m "chore: rebuild publications and pdf [skip ci]"
          git push
