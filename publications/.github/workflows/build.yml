name: Build & Deploy CV

on:
  push:
    branches: [main]
    paths:
      - "publications/**.bib"   # rebuild whenever a .bib file changes
      - "index.html"
      - "build_publications.py"
  workflow_dispatch:            # allow manual trigger from GitHub UI

permissions:
  contents: write               # needed to commit the updated index.html

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install bibtexparser jinja2

      - name: Build publications
        run: python build_publications.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html _publications.html
          git diff --cached --quiet || git commit -m "chore: rebuild publications [skip ci]"
          git push
